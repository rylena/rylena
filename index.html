<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Rylen README Preview</title>
  <style>
    :root {
      color-scheme: light dark;
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #0f172a;
      color: #e5e7eb;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: start center;
      padding: 32px;
      background:
        linear-gradient(135deg, rgba(15, 23, 42, 0.94), rgba(17, 24, 39, 0.94)),
        radial-gradient(circle at 15% 20%, rgba(20, 184, 166, 0.22), transparent 32%),
        radial-gradient(circle at 82% 12%, rgba(59, 130, 246, 0.18), transparent 30%);
    }

    main {
      width: min(1175px, 100%);
    }

    header {
      display: flex;
      align-items: end;
      justify-content: space-between;
      gap: 16px;
      margin-bottom: 18px;
    }

    h1 {
      margin: 0;
      font-size: clamp(22px, 3vw, 34px);
      line-height: 1.05;
      letter-spacing: 0;
    }

    p {
      margin: 8px 0 0;
      color: #a7b0c0;
      font-size: 15px;
    }

    a {
      color: #67e8f9;
      text-decoration: none;
      white-space: nowrap;
    }

    a:hover {
      text-decoration: underline;
    }

    .preview {
      border: 1px solid rgba(148, 163, 184, 0.28);
      border-radius: 18px;
      background: rgba(15, 23, 42, 0.55);
      padding: 14px;
      box-shadow: 0 24px 80px rgba(0, 0, 0, 0.28);
    }

    img {
      display: block;
      width: 100%;
      height: auto;
      border-radius: 16px;
    }

    .socials {
      display: flex;
      justify-content: center;
      gap: 12px;
      flex-wrap: wrap;
      margin: 16px 0 0;
      color: #a7b0c0;
      font-size: 15px;
    }

    @media (max-width: 720px) {
      body {
        padding: 18px;
      }

      header {
        display: block;
      }

      a {
        display: inline-block;
        margin-top: 10px;
      }
    }
  </style>
</head>
<body>
  <main>
    <header>
      <div>
        <h1>README preview</h1>
        <p>This is the same generated SVG that the GitHub profile README uses.</p>
      </div>
      <a href="./README.md">Open README.md</a>
    </header>
    <div class="preview">
      <img src="./dark_mode.svg?v=2" alt="Rylen Anil profile README preview">
    </div>
    <p class="socials" aria-label="Social links">
      <a href="https://x.com/DarthKermi72747">@DarthKermi72747</a>
      <a href="https://www.linkedin.com/in/rylen-anil-perumkannaril/">@rylen-anil-perumkannaril</a>
      <span>@darth_kermit1</span>
    </p>
  </main>
</body>
</html>
